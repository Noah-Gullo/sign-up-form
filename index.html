<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Sign Up Form</title>
</head>
    <body>
        <div class="right">
            <div class="topright">
                <p>This is not a real online service! You know you need something like this in 
                    your life to help you realize your deepest dreams. </p>
                <p id="sign-up">Sign up <em>now</em> to get started</p>
                <p id="motivation">You <em>know</em> you want to</p>
            </div>

            <div class="midright">
                <p>Let's do this!</p>
                <form>
                    <fieldset>
                        <label for="first-name">FIRST NAME</label>
                        <input id="first-name" name="user_first_name" type="text">

                        <label for="email">EMAIL</label>
                        <input id="email" name="user_email" type="email">

                        <label for="last-">PASSWORD</label>
                        <input id="password" name="user_password" minlength="3" type="password" required>
                    </fieldset>

                    <fieldset>
                        <label for="last-name">LAST NAME</label>
                        <input id="last-name" name="user_last_name" type="text">

                        <label for="phone-number">PHONE NUMBER</label>
                        <input id="phone-number" name="user_phone_number" pattern="(\d{3}(\-)\d{3}(\-)\d{4})" type="number">

                        <label for="last-">CONFIRM PASSWORD</label>
                        <input id="confirm-password" name="user_password" minlength="3" required type="password">
                    </fieldset>
                </form>
            </div>

            <div class="bottomright">
                <button type="submit" id="submit-button">Create Account</button> 
                <p>Already have an account? <a href="https://theodinproject.com">Log-In</a></p>
            </div>
        </div>

        <div class="left">
            <img src="assets/images/odin-icon.png" alt="Icon of Odin" width="75px">  
            <p class="odin-text">ODIN</p>
            <div class="semi-transparent"></div>
            <img src="assets/images/green-leaf-background.jpg" alt="Leafy green background" width="423px" height="697px">
            <div class="credit-text">
                Photo by 
                <a href="https://unsplash.com/@haliewestphoto">Halie West<a> 
                on 
                <a href="https://unsplash.com/">Unsplash</a>
            </div>
        </div>
    </body>
</html>
